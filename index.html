<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teachings (Dharma)</title>
    <meta
      name="description"
      content="Teachings (Dharma): the Words of the Buddha and commentarial treatises, translated and modernized for readability."
    />
    <link rel="canonical" href="https://empty.guru/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0b0b0b" />
    <!-- The page renders this Markdown file client-side; expose it as the
         machine-readable alternate so crawlers and AI fetchers read the text
         without running JavaScript. -->
    <link rel="alternate" type="text/markdown" href="README.md" />
    <!-- Open Graph (link previews on social and chat apps). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="empty.guru" />
    <meta property="og:title" content="Teachings (Dharma)" />
    <meta
      property="og:description"
      content="The Words of the Buddha and commentarial treatises, translated and modernized for readability."
    />
    <meta property="og:url" content="https://empty.guru/" />
    <meta property="og:locale" content="en_US" />
    <!-- Twitter / X card. -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Teachings (Dharma)" />
    <meta
      name="twitter:description"
      content="The Words of the Buddha and commentarial treatises, translated and modernized for readability."
    />
    <!-- Structured data: identifies the site and its publisher to search and
         AI systems. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://empty.guru/#website",
            "url": "https://empty.guru/",
            "name": "empty.guru",
            "alternateName": "Teachings (Dharma)",
            "description": "The Words of the Buddha and commentarial treatises, translated and modernized for readability.",
            "inLanguage": "en"
          },
          {
            "@type": "Organization",
            "@id": "https://empty.guru/#org",
            "name": "empty.guru",
            "url": "https://empty.guru/",
            "sameAs": ["https://github.com/ryanallen/dharma"]
          }
        ]
      }
    </script>
    <link rel="stylesheet" href="site/noto-fonts.css" />
    <link rel="stylesheet" href="site/vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="site/styles.css" />
    <!-- Apply the saved theme and panel toggles before first paint (no flash).
         Keys mirror site/settings.js; "System" resolves to the device theme. -->
    <script>
      (function () {
        try {
          var d = document.documentElement,
            s = window.localStorage;
          var m = s.getItem('leaf.theme') || 'system';
          d.dataset.theme =
            m === 'light' || m === 'dark' || m === 'dracula'
              ? m
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          if (s.getItem('leaf.minimap') === '0') d.dataset.minimap = 'off';
          if (s.getItem('leaf.library') === '0') d.dataset.library = 'off';
          // Gutter line numbers default OFF so the page reads clean and crawlers
          // never scrape a block's number into the result snippet.
          if (s.getItem('leaf.lineNumbers') !== '1') d.dataset.lineNumbers = 'off';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <main class="page">
      <article class="markdown-body" id="content" tabindex="-1"></article>
      <p class="status" id="status">Loading…</p>
    </main>
    <script type="module" src="site/reader.js"></script>
    <script type="module">
      // Intercept clicks on docs/*.md links in the rendered README and send
      // them to the docs viewer (#/route) instead of serving raw markdown.
      document.getElementById('content').addEventListener('click', (event) => {
        const link = event.target.closest('a');
        if (!link) return;
        const href = link.getAttribute('href');
        if (!href) return;
        // Match docs/<path>.md at any nesting depth (docs/a/b/c.md), with an
        // optional #anchor. Absolute URLs (http://…/docs/x.md) start with a
        // scheme and are left alone.
        const m = href.match(/^docs[/\\](.+?)\.md(?:#(.*))?$/i);
        if (!m) return;
        event.preventDefault();
        const route = m[1].replace(/\\/g, '/');
        const anchor = m[2] || '';
        location.href = 'docs/#/' + route + (anchor ? '#' + anchor : '');
      });
    </script>
  </body>
</html>
