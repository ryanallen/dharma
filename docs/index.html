    <link rel="stylesheet" href="../site/styles.css" />
    <link rel="stylesheet" href="docs.css" />
    <!-- Apply the saved theme and panel toggles before first paint (no flash).
         Keys mirror ../site/settings.js; "System" resolves to the device theme. -->
    <script>
      (function () {
        try {
          var d = document.documentElement,
            s = window.localStorage;
          var m = s.getItem('leaf.theme') || 'system';
          d.dataset.theme =
            m === 'light' || m === 'dark' || m === 'dracula'
              ? m
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          if (s.getItem('leaf.minimap') === '0') d.dataset.minimap = 'off';
          if (s.getItem('leaf.library') === '0') d.dataset.library = 'off';
          if (s.getItem('leaf.speedReader') === '1') d.dataset.speedReader = 'true';
        } catch (e) {}
      })();
    </script>
  </head>
